description: >-
  United States Africa Command (AFRICOM) is a unified combatant command of the United
  States Department of Defense responsible for military operations and coordination
  in Africa. AFRICOM's primary mission is to advance U.S. national security interests
  and promote regional stability through security cooperation, military assistance,
  and joint training exercises with African partner nations.
